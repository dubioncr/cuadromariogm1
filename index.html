<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; justify-content: center; align-items: center;
        z-index: 999; background: rgba(0, 0, 0, 0.2); pointer-events: none;
      }
      .scan-message {
        background: rgba(0, 0, 0, 0.7); color: #00FFFF; padding: 20px 40px;
        border-radius: 50px; border: 2px solid #00FFFF; font-weight: bold;
        text-transform: uppercase; letter-spacing: 2px;
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.5); animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
        100% { opacity: 0.6; transform: scale(1); }
      }
      .hidden { display: none !important; }
    </style>

    <script>
      AFRAME.registerShader('chroma-key', {
        schema: {
          src: {type: 'map'},
          keyColor: {default: {r: 0, g: 0.69, b: 0.25}, type: 'color'},
          threshold: {default: 0.4, type: 'number'}
        },
        init: function(data) {
          const videoTexture = new THREE.VideoTexture(data.src);
          videoTexture.minFilter = THREE.LinearFilter;
          videoTexture.magFilter = THREE.LinearFilter;

          this.material = new THREE.ShaderMaterial({
            uniforms: {
              tex: {value: videoTexture},
              keyColor: {value: new THREE.Color(data.keyColor)},
              threshold: {value: data.threshold}
            },
            vertexShader: `
              varying vec2 vUv;
              void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
              }
            `,
            fragmentShader: `
              uniform sampler2D tex;
              uniform vec3 keyColor;
              uniform float threshold;
              varying vec2 vUv;
              void main() {
                vec4 fColor = texture2D(tex, vUv);
                float diff = distance(fColor.rgb, keyColor);
                if (diff < threshold) {
                  discard; 
                } else {
                  gl_FragColor = vec4(fColor.rgb, 1.0);
                }
              }
            `,
            transparent: true
          });
        },
        tick: function() {
          if (this.material && this.material.uniforms.tex.value) {
            this.material.uniforms.tex.value.needsUpdate = true;
          }
        }
      });
    </script>
  </head>
  <body>

    <div id="scanning-overlay">
      <div class="scan-message">Escanea la tarjeta</div>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./target.mind;" 
      renderer="colorManagement: true" 
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="galaxyVideo" src="mariogalaxy1.mp4" loop="true" crossorigin="anonymous" playsinline></video>
        <img id="marioFondo" src="fondomariogalaxy1.png" crossorigin="anonymous">
        <img id="marioTitulo" src="mariogalaxytitulo1.png" crossorigin="anonymous">
        <audio id="galaxyAudio" src="mariogalaxyop.mp3" preload="auto" crossorigin="anonymous"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target0" mindar-image-target="targetIndex: 0">
        
        <a-image 
          src="#marioFondo" 
          width="1" 
          height="1.49" 
          position="0 0 0" 
          rotation="0 0 0">
        </a-image>

        <a-entity 
          id="marioEntity"
          geometry="primitive: plane; width: 1; height: 1.49" 
          material="shader: chroma-key; src: #galaxyVideo; keyColor: #00B140; threshold: 0.36"
          rotation="0 0 0"
          position="0 0 0"
          scale="1 1 1"
          animation="property: position; to: 0 0 0.4; dur: 1000; easing: easeOutElastic; startEvents: targetFound">
        </a-entity>

        <a-image 
          src="#marioTitulo" 
          width="1" 
          height="1.29" 
          position="0.2 0.45 0.2" 
          rotation="0 0 0"
          scale="0.5 0.3 0.3">
        </a-image>

      </a-entity>
    </a-scene>

    <script>
      const targetEntity = document.getElementById('target0');
      const marioVideoEntity = document.getElementById('marioEntity');
      const video = document.querySelector('#galaxyVideo');
      const audio = document.querySelector('#galaxyAudio');
      const overlay = document.getElementById('scanning-overlay');

      targetEntity.addEventListener("targetFound", () => {
        overlay.classList.add("hidden");
        
        // Reiniciar audio al principio y reproducir
        audio.currentTime = 0;
        audio.play();
        
        video.play();
        marioVideoEntity.emit('targetFound');
      });

      targetEntity.addEventListener("targetLost", () => {
        overlay.classList.remove("hidden");
        
        // Pausar audio al perder el enfoque
        audio.pause();
        
        video.pause();
        marioVideoEntity.setAttribute('position', '0 0 0');
      });

      // Manejo de la política de reproducción automática
      window.addEventListener('click', () => { 
        video.play(); 
        video.pause(); 
        audio.play();
        audio.pause();
      }, { once: true });
    </script>
  </body>
</html>
